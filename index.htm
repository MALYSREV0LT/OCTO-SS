<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCTO SS</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { 
            --octo-blue: #1976d2; 
            --octo-dark: #0d47a1;
            --company-bg: #e3f2fd; 
            --company-border: #bbdefb;
            --bg: #f0f2f5; 
            --success: #2e7d32; 
            --danger: #d32f2f; 
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 8px; font-size: 14px; -webkit-tap-highlight-color: transparent; }
        .card { background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; position: relative; z-index: 1; }
        
        h1 { color: var(--octo-blue); text-align: center; margin: 15px 0; font-size: 42px; font-weight: bold; letter-spacing: 2px; text-shadow: -1px -1px 1px rgba(0,0,0,0.3), 1px 1px 1px #fff; }

        .field-label { display: block; font-size: 11px; font-weight: bold; color: #444; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea { border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; background: #fff; position: relative; z-index: 5; }
        
        .header-layout { display: flex; gap: 8px; margin-bottom: 8px; align-items: stretch; }
        .company-box { flex: 1.5; background: var(--company-bg); padding: 10px; border-radius: 6px; font-size: 11px; border: 1px solid var(--company-border); line-height: 1.4; color: #0d47a1; }
        
        .nav-square-btn { width: 70px; background: var(--company-bg); color: #0d47a1; border: 1px solid var(--company-border); border-radius: 6px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 9px; font-weight: bold; text-transform: uppercase; flex-shrink: 0; z-index: 10; }
        .nav-square-btn span { font-size: 24px; margin-bottom: 2px; }

        .customer-box { flex: 2; display: flex; flex-direction: column; gap: 6px; }

        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-block { aspect-ratio: 1 / 1.1; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; background: #fff; border: 1px solid rgba(0,0,0,0.05); box-shadow: 4px 4px 8px #cbcbcb, -2px -2px 5px #ffffff; }
        
        .btn-top { flex: 1; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-weight: bold; padding: 4px; cursor: pointer; text-transform: uppercase; position: relative; }
        .btn-top svg { width: 45px; height: 45px; margin-bottom: 4px; fill: white; pointer-events: none; }

        .btn-time-input { background: rgba(255,255,255,0.2) !important; border: 1px solid rgba(255,255,255,0.5) !important; color: white !important; font-size: 28px !important; font-weight: bold; text-align: center; width: 90% !important; padding: 2px !important; margin: 2px 0; border-radius: 4px; z-index: 20; }

        .btn-text { font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: center; pointer-events: none; margin-top: 2px; }

        @keyframes blinker { 50% { opacity: 0.3; } }
        .blinking { animation: blinker 1s linear infinite; }

        .bg-drive { background: linear-gradient(145deg, #1e88e5, #1565c0); }
        .bg-drive-end { background: linear-gradient(145deg, #1565c0, #0d47a1); }
        .bg-work { background: linear-gradient(145deg, #1565c0, #0d47a1); }
        .bg-work-end { background: linear-gradient(145deg, #0d47a1, #0a2f6a); }

        .btn-bottom { background: #fff; padding: 2px; border-top: 1px solid #eee; }
        .btn-bottom input { border: none !important; padding: 4px 2px !important; font-size: 10px !important; text-align: center; background: transparent; width: 100%; height: auto; }

        .part-item-block { border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        .item-row { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }

        .input-group-styled { display: flex; gap: 2px; align-items: center; border: 1px solid #ccc; border-radius: 6px; padding-right: 2px; background: white; overflow: hidden; flex: 1; position: relative; z-index: 5; }
        .input-group-styled input { border: none; }

        .btn-plus-flat { background: transparent; color: var(--octo-blue); border: none; width: 40px; height: 40px; font-weight: bold; cursor: pointer; font-size: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .btn-del-flat { background: transparent; color: var(--danger); border: none; width: 40px; height: 40px; cursor: pointer; font-size: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .scan-btn-graphic { background: transparent; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; flex-shrink: 0; z-index: 10; }
        .scan-btn-graphic svg { width: 32px; height: 32px; pointer-events: none; }
        
        .sig-container { display: flex; gap: 8px; }
        .sig-wrapper { flex: 1; text-align: center; position: relative; }
        canvas { border: 1px solid #999; background: #fff; width: 100%; height: 100px; touch-action: none; border-radius: 4px; position: relative; z-index: 5; }
        
        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        #qr-reader { width: 100%; height: 100%; }
        #close-scanner { position: absolute; top: 20px; right: 20px; z-index: 10000; padding: 15px; background: red; color: white; border: none; border-radius: 50%; font-weight: bold; }
        .gps-loading { background-color: #fff9c4 !important; }
    </style>
</head>
<body>

<div id="main-app">
    <h1>OCTO SS</h1>
    <div class="header-layout">
        <div class="company-box">
            <strong>Your Solutions s.r.o.</strong><br>
            helpdesk@ys.cz | Tel.: +420 277 775 555
        </div>
        <button class="nav-square-btn" onclick="openNav()"><span>📍</span>MAPA</button>
        <div class="customer-box">
            <input type="text" id="customer" placeholder="Zákazník (Adresa)">
            <input type="email" id="customer-email" placeholder="E-mail">
            <input type="text" id="order-id" placeholder="ID ZAKÁZKY">
        </div>
    </div>

    <div class="card">
        <span class="field-label">Popis závady:</span>
        <textarea id="issue-desc" rows="2" placeholder="Popis závady..."></textarea>
        
        <div class="control-grid">
            <div class="btn-block">
                <div class="btn-top bg-drive" onclick="startTimer('drive', 'dt-to', 'input-start-drive', 'txt-drive-start')">
                    <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
                    <input type="text" id="input-start-drive" class="btn-time-input" value="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text" id="txt-drive-start">Zahájit jízdu</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-to"></div>
            </div>
            <div class="btn-block">
                <div class="btn-top bg-drive-end" onclick="stopTimer('drive', 'dt-from', 'input-end-drive', 'input-start-drive', 'txt-drive-end', 'txt-drive-start')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4.59-12.42L10 14.17l-2.59-2.58L6 13l4 4 8-8z"/></svg>
                    <input type="text" id="input-end-drive" class="btn-time-input" value="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text" id="txt-drive-end">Ukončit jízdu</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-from"></div>
            </div>

            <div class="btn-block">
                <div class="btn-top bg-work" onclick="startTimer('work', 'dt-start', 'input-start-work', 'txt-work-start')">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <input type="text" id="input-start-work" class="btn-time-input" value="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text" id="txt-work-start">Zahájit práci</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-start"></div>
            </div>
            <div class="btn-block">
                <div class="btn-top bg-work-end" onclick="stopTimer('work', 'dt-end', 'input-end-work', 'input-start-work', 'txt-work-end', 'txt-work-start')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4.59-12.42L10 14.17l-2.59-2.58L6 13l4 4 8-8z"/></svg>
                    <input type="text" id="input-end-work" class="btn-time-input" value="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text" id="txt-work-end">Ukončit práci</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-end"></div>
            </div>
        </div>
        <input type="number" id="km-trip" placeholder="Ujetých KM" style="margin-top:12px; font-weight: bold; border: 2px solid var(--octo-blue);">
    </div>

    <div class="card">
        <span class="field-label">SEZNAM POUŽITÝCH DÍLŮ:</span>
        <div id="parts-list">
            <div class="part-item-block">
                <div class="item-row">
                    <div class="input-group-styled"><input type="text" class="p-n" placeholder="Díl / Materiál"><button class="btn-plus-flat" onclick="addPart()">+</button></div>
                    <div class="input-group-styled" style="flex:0.6;"><input type="text" class="p-note" placeholder="Pozn./ks"></div>
                </div>
                <div class="item-row">
                    <div class="input-group-styled"><input type="text" id="o-init" class="p-so" placeholder="S/N pův."><button class="scan-btn-graphic" onclick="startScanner('o-init')"><svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg></button></div>
                    <div class="input-group-styled"><input type="text" id="n-init" class="p-sn" placeholder="S/N nové"><button class="scan-btn-graphic" onclick="startScanner('n-init')"><svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg></button></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="field-label">Popis řešení:</span>
        <textarea id="work-desc" rows="3" placeholder="Popis práce..."></textarea>
    </div>

    <div class="card">
        <div class="sig-container">
            <div class="sig-wrapper"><span class="field-label">Technik</span><canvas id="sig-worker"></canvas></div>
            <div class="sig-wrapper"><span class="field-label">Zákazník</span><canvas id="sig-cust"></canvas></div>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:10px;">
        <button onclick="window.print()" style="flex:1; padding:18px; background:var(--octo-blue); color:white; border:none; border-radius:10px; font-weight:bold;">TISK / PDF</button>
        <button onclick="sendEmail()" style="flex:1; padding:18px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold;">EMAIL</button>
    </div>
</div>

<div id="video-container">
    <div id="qr-reader"></div>
    <button id="close-scanner" onclick="stopScanner()">X</button>
</div>

<script>
    let timers = { work: null, drive: null };
    let startTimes = { work: "", drive: "" };
    let html5QrCode = null;

    function getHHMM() {
        const d = new Date();
        return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
    }

    // NOVÉ: Načtení dat při startu
    function loadSavedState() {
        ['drive', 'work'].forEach(type => {
            const isRunning = localStorage.getItem(type + '_running') === 'true';
            const savedStart = localStorage.getItem(type + '_start');
            const savedDtStart = localStorage.getItem(type + '_dtStart');
            
            if (savedStart) {
                const inputId = type === 'drive' ? 'input-start-drive' : 'input-start-work';
                const dtId = type === 'drive' ? 'dt-to' : 'dt-start';
                const textId = type === 'drive' ? 'txt-drive-start' : 'txt-work-start';
                
                document.getElementById(inputId).value = savedStart;
                document.getElementById(dtId).value = savedDtStart;
                startTimes[type] = savedStart;

                if (isRunning) {
                    document.getElementById(inputId).classList.add('blinking');
                    document.getElementById(textId).innerText = (type === 'drive' ? "JÍZDA PROBÍHÁ" : "PRÁCE PROBÍHÁ");
                    timers[type] = setInterval(() => { document.getElementById(inputId).value = getHHMM(); }, 1000);
                } else {
                    const savedEnd = localStorage.getItem(type + '_end');
                    const savedDtEnd = localStorage.getItem(type + '_dtEnd');
                    const endInputId = type === 'drive' ? 'input-end-drive' : 'input-end-work';
                    const endDtId = type === 'drive' ? 'dt-from' : 'dt-end';
                    const endTextId = type === 'drive' ? 'txt-drive-end' : 'txt-work-end';
                    
                    if (savedEnd) {
                        document.getElementById(endInputId).value = savedEnd;
                        document.getElementById(endDtId).value = savedDtEnd;
                        const label = (type === 'drive' ? "JÍZDA UKONČENA" : "PRÁCE UKONČENA");
                        document.getElementById(textId).innerText = label;
                        document.getElementById(endTextId).innerText = label;
                    }
                }
            }
        });
        const savedKm = localStorage.getItem('km_trip');
        if (savedKm) document.getElementById('km-trip').value = savedKm;
    }

    function startTimer(type, dtId, inputId, textId) {
        if (timers[type]) return; 
        const input = document.getElementById(inputId);
        const textField = document.getElementById(textId);
        const now = new Date();
        const dtVal = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
        const time = getHHMM();

        document.getElementById(dtId).value = dtVal;
        input.value = time;
        startTimes[type] = time;
        input.classList.add('blinking');
        textField.innerText = (type === 'drive' ? "JÍZDA PROBÍHÁ" : "PRÁCE PROBÍHÁ");

        // Uložení
        localStorage.setItem(type + '_start', time);
        localStorage.setItem(type + '_dtStart', dtVal);
        localStorage.setItem(type + '_running', 'true');

        timers[type] = setInterval(() => { input.value = getHHMM(); }, 1000);

        if (type === 'drive' && navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                localStorage.setItem('lat1', pos.coords.latitude);
                localStorage.setItem('lon1', pos.coords.longitude);
            }, null, { enableHighAccuracy: true });
        }
    }

    function stopTimer(type, dtId, inputId, startInputId, textId, startTextId) {
        if (!timers[type]) return;
        clearInterval(timers[type]);
        timers[type] = null;
        
        const startInput = document.getElementById(startInputId);
        const endInput = document.getElementById(inputId);
        const now = new Date();
        const dtVal = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
        const endTime = getHHMM();

        document.getElementById(dtId).value = dtVal;
        startInput.classList.remove('blinking');
        startInput.value = startTimes[type];
        endInput.value = endTime;
        
        const label = (type === 'drive' ? "JÍZDA UKONČENA" : "PRÁCE UKONČENA");
        document.getElementById(startTextId).innerText = label;
        document.getElementById(textId).innerText = label;

        // Uložení stavu ukončení
        localStorage.setItem(type + '_running', 'false');
        localStorage.setItem(type + '_end', endTime);
        localStorage.setItem(type + '_dtEnd', dtVal);

        if (type === 'drive' && navigator.geolocation) {
            const kmField = document.getElementById('km-trip');
            kmField.classList.add('gps-loading');
            navigator.geolocation.getCurrentPosition(pos => {
                const lat1 = parseFloat(localStorage.getItem('lat1'));
                const lon1 = parseFloat(localStorage.getItem('lon1'));
                if (lat1 && lon1) {
                    const R = 6371;
                    const dLat = (pos.coords.latitude - lat1) * Math.PI / 180;
                    const dLon = (pos.coords.longitude - lon1) * Math.PI / 180;
                    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(pos.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                    const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                    const resultKm = Math.round(dist * 1.3);
                    kmField.value = resultKm;
                    localStorage.setItem('km_trip', resultKm);
                }
                kmField.classList.remove('gps-loading');
            }, () => kmField.classList.remove('gps-loading'), { enableHighAccuracy: true });
        }
    }

    function addPart() {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'part-item-block';
        div.innerHTML = `
            <div class="item-row">
                <div class="input-group-styled"><input type="text" class="p-n" placeholder="Díl / Materiál"><button class="btn-del-flat" onclick="this.closest('.part-item-block').remove()">🗑️</button></div>
                <div class="input-group-styled" style="flex:0.6;"><input type="text" class="p-note" placeholder="Pozn./ks"></div>
            </div>
            <div class="item-row">
                <div class="input-group-styled"><input type="text" id="o-${id}" class="p-so" placeholder="S/N pův."><button class="scan-btn-graphic" onclick="startScanner('o-${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg></button></div>
                <div class="input-group-styled"><input type="text" id="n-${id}" class="p-sn" placeholder="S/N nové"><button class="scan-btn-graphic" onclick="startScanner('n-${id}')"><svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg></button></div>
            </div>`;
        document.getElementById('parts-list').appendChild(div);
    }

    async function startScanner(inputId) {
        document.getElementById('video-container').style.display = 'block';
        if (html5QrCode) { await html5QrCode.clear(); } // Vyčištění předchozí instance
        html5QrCode = new Html5Qrcode("qr-reader");
        try {
            // Oprava pro Android: čtení z kamery prostředí
            await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: { width: 280, height: 160 } }, (text) => {
                document.getElementById(inputId).value = text;
                stopScanner();
            });
        } catch (e) { 
            console.error(e);
            stopScanner(); 
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                html5QrCode.clear();
                document.getElementById('video-container').style.display = 'none';
            }).catch(() => {
                document.getElementById('video-container').style.display = 'none';
            });
        }
    }

    function setupCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width; canvas.height = rect.height;
        let drawing = false;
        const getPos = (e) => {
            const t = e.touches ? e.touches[0] : e;
            const r = canvas.getBoundingClientRect();
            return { x: t.clientX - r.left, y: t.clientY - r.top };
        };
        const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
        const stop = () => { drawing = false; };
        canvas.addEventListener("touchstart", start); canvas.addEventListener("touchmove", move, {passive: false}); canvas.addEventListener("touchend", stop);
        canvas.onmousedown = start; canvas.onmousemove = move; window.onmouseup = stop;
    }

    function openNav() {
        const a = document.getElementById('customer').value;
        if (a) window.open("https://www.google.com/maps/search/" + encodeURIComponent(a));
    }

    function sendEmail() {
        window.location.href = `mailto:${document.getElementById('customer-email').value}?subject=Protokol ${document.getElementById('order-id').value}`;
    }

    window.onload = () => { 
        setupCanvas("sig-worker"); 
        setupCanvas("sig-cust"); 
        loadSavedState(); 
    };
</script>
</body>
</html>
