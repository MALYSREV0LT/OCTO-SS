<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OCTO SS</title>
    <style>
        :root { 
            --octo-blue: #1976d2; 
            --octo-dark: #0d47a1;
            --company-bg: #e3f2fd; 
            --company-border: #bbdefb;
            --bg: #f0f2f5; 
            --success: #2e7d32; 
            --danger: #d32f2f; 
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 8px; font-size: 14px; }
        .card { background: #fff; padding: 12px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        
        h1 { 
            color: var(--octo-blue); 
            text-align: center; 
            margin: 15px 0; 
            font-size: 42px; 
            font-weight: bold; 
            letter-spacing: 2px;
            text-shadow: -1px -1px 1px rgba(0,0,0,0.3), 1px 1px 1px #fff;
        }

        .field-label { display: block; font-size: 11px; font-weight: bold; color: #444; margin-bottom: 4px; text-transform: uppercase; }
        input, textarea { border: 1px solid #ccc; border-radius: 6px; padding: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        .header-layout { display: flex; gap: 8px; margin-bottom: 8px; align-items: stretch; }
        .company-box { flex: 1.5; background: var(--company-bg); padding: 10px; border-radius: 6px; font-size: 12px; border: 1px solid var(--company-border); line-height: 1.4; color: #0d47a1; }
        
        .nav-square-btn { 
            width: 70px; 
            background: var(--company-bg); 
            color: #0d47a1; 
            border: 1px solid var(--company-border); 
            border-radius: 6px; 
            cursor: pointer; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 9px; 
            font-weight: bold; 
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .nav-square-btn span { font-size: 24px; margin-bottom: 2px; }

        .customer-box { flex: 2; display: flex; flex-direction: column; gap: 6px; }

        /* Mřížka tlačítek upravena na 2x2 pro zachování pořadí */
        .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-block { 
            aspect-ratio: 1 / 1.1; 
            border-radius: 12px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            background: #fff;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 4px 4px 8px #cbcbcb, -2px -2px 5px #ffffff;
        }
        
        .btn-top { flex: 1; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; font-weight: bold; padding: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-top svg { width: 60px; height: 60px; margin-bottom: 4px; fill: white; }

        .btn-time-input {
            background: transparent;
            border: none !important;
            color: white;
            font-size: 32px !important;
            font-weight: bold;
            text-align: center;
            width: 100% !important;
            padding: 0 !important;
            margin: 2px 0;
            cursor: text;
        }
        .btn-time-input:focus { outline: none; }

        .btn-text { font-size: 14px; font-weight: bold; text-transform: uppercase; }

        @keyframes blinker { 50% { opacity: 0.1; } }
        .blinking { animation: blinker 1s linear infinite; }

        .bg-work { background: linear-gradient(145deg, #1565c0, #0d47a1); }
        .bg-work-end { background: linear-gradient(145deg, #0d47a1, #0a2f6a); }
        .bg-drive { background: linear-gradient(145deg, #1e88e5, #1565c0); }
        .bg-drive-end { background: linear-gradient(145deg, #1565c0, #0d47a1); }

        .btn-bottom { background: #fff; padding: 2px; border-top: 1px solid #eee; }
        .btn-bottom input { border: none !important; padding: 4px 2px !important; font-size: 10px !important; text-align: center; background: transparent; width: 100%; }

        /* Dvouřádkové uspořádání dílů */
        .part-item-block { border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 10px; }
        .part-item-block:last-child { border: none; }
        .item-row { display: flex; gap: 4px; margin-bottom: 6px; align-items: center; }

        .input-group-styled { 
            display: flex; 
            gap: 2px; 
            align-items: center; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            padding-right: 2px;
            background: white;
            overflow: hidden;
            flex: 1;
        }
        .input-group-styled input { border: none; border-radius: 6px 0 0 6px; }

        .btn-plus-flat { background: transparent; color: var(--octo-blue); border: none; width: 40px; height: 40px; font-weight: bold; cursor: pointer; font-size: 32px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .btn-del-flat { background: transparent; color: var(--danger); border: none; width: 40px; height: 40px; cursor: pointer; font-size: 22px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        
        .scan-btn-graphic { background: transparent; border: none; cursor: pointer; padding: 0; display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; flex-shrink: 0; }
        .scan-btn-graphic svg { width: 32px; height: 32px; }
        
        .sig-container { display: flex; gap: 8px; }
        .sig-wrapper { flex: 1; text-align: center; }
        canvas { border: 1px solid #999; background: #fff; width: 100%; height: 90px; touch-action: none; border-radius: 4px; }
        .btn-clear { background: #999; color: white; border: none; padding: 5px; font-size: 11px; width: 100%; border-radius: 0 0 4px 4px; }
        
        .action-row { display: flex; gap: 10px; margin-top: 15px; padding-bottom: 20px; }
        .main-btn { flex: 1; background: var(--octo-blue); color: white; border: none; padding: 18px 5px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }
        .email-btn { flex: 1; background: var(--success); color: white; border: none; padding: 18px 5px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; }

        #video-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div id="main-app">
    <h1>OCTO SS</h1>
    <div class="header-layout">
        <div class="company-box">
            <strong>Your Solutions s.r.o.</strong><br>
            Türkova 2319/5b, 149 00 Praha 4<br>
            E-mail: helpdesk@ys.cz | Tel.: +420 277 775 555
        </div>
        <button class="nav-square-btn" onclick="openNav()"><span>📍</span>MAPA</button>
        <div class="customer-box">
            <input type="text" id="customer" placeholder="Zákazník (Adresa)">
            <input type="email" id="customer-email" placeholder="E-mail">
            <input type="text" id="order-id" placeholder="ID ZAKÁZKY">
        </div>
    </div>

    <div class="card">
        <span class="field-label">Popis závady:</span>
        <textarea id="issue-desc" rows="2" placeholder="Popis nahlášené závady..."></textarea>
        
        <div class="control-grid">
            <div class="btn-block">
                <div class="btn-top bg-drive" onclick="toggleTimer('drive', 'dt-to', 'input-start-drive', true)">
                    <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
                    <input type="text" id="input-start-drive" class="btn-time-input" placeholder="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text">Zahájit jízdu</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-to"></div>
            </div>
            <div class="btn-block">
                <div class="btn-top bg-drive-end" onclick="stopTimer('drive', 'dt-from', 'input-end-drive', 'input-start-drive', true)">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4.59-12.42L10 14.17l-2.59-2.58L6 13l4 4 8-8z"/></svg>
                    <input type="text" id="input-end-drive" class="btn-time-input" placeholder="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text">Ukončit jízdu</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-from"></div>
            </div>

            <div class="btn-block">
                <div class="btn-top bg-work" onclick="toggleTimer('work', 'dt-start', 'input-start-work')">
                    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                    <input type="text" id="input-start-work" class="btn-time-input" placeholder="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text">Zahájit práci</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-start"></div>
            </div>
            <div class="btn-block">
                <div class="btn-top bg-work-end" onclick="stopTimer('work', 'dt-end', 'input-end-work', 'input-start-work')">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm4.59-12.42L10 14.17l-2.59-2.58L6 13l4 4 8-8z"/></svg>
                    <input type="text" id="input-end-work" class="btn-time-input" placeholder="00:00" onclick="event.stopPropagation()">
                    <span class="btn-text">Ukončit práci</span>
                </div>
                <div class="btn-bottom"><input type="datetime-local" id="dt-end"></div>
            </div>
        </div>
        <input type="number" id="km-trip" placeholder="Ujetých KM" style="margin-top:12px;">
    </div>

    <div class="card">
        <span class="field-label">SEZNAM POUŽITÝCH DÍLŮ:</span>
        <div id="parts-list">
            <div class="part-item-block">
                <div class="item-row">
                    <div class="input-group-styled">
                        <input type="text" class="p-n" placeholder="Díl / Materiál">
                        <button class="btn-plus-flat" onclick="addPart()">+</button>
                    </div>
                    <div class="input-group-styled" style="flex:0.6;"><input type="text" class="p-note" placeholder="Pozn./ks"></div>
                </div>
                <div class="item-row">
                    <div class="input-group-styled">
                        <input type="text" id="o-init" class="p-so" placeholder="S/N pův.">
                        <button class="scan-btn-graphic" onclick="startScanner('o-init')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg>
                        </button>
                    </div>
                    <div class="input-group-styled">
                        <input type="text" id="n-init" class="p-sn" placeholder="S/N nové">
                        <button class="scan-btn-graphic" onclick="startScanner('n-init')">
                            <svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="field-label">Popis řešení:</span>
        <textarea id="work-desc" rows="3" placeholder="Popis práce..."></textarea>
    </div>

    <div class="card">
        <div class="sig-container">
            <div class="sig-wrapper"><span class="field-label">Technik</span><canvas id="sig-worker"></canvas><button class="btn-clear" onclick="clearCanvas('sig-worker')">Smazat</button></div>
            <div class="sig-wrapper"><span class="field-label">Zákazník</span><canvas id="sig-cust"></canvas><button class="btn-clear" onclick="clearCanvas('sig-cust')">Smazat</button></div>
        </div>
    </div>

    <div class="action-row">
        <button class="main-btn" onclick="window.print()">TISK / PDF</button>
        <button class="email-btn" onclick="sendEmail()">EMAIL</button>
    </div>
</div>

<div id="video-container">
    <video id="video" playsinline></video>
    <button style="position:absolute; top:20px; right:20px; padding:15px; background:red; color:white; border:none; border-radius:50%; font-weight:bold;" onclick="stopScanner()">X</button>
</div>

<script>
    let timers = { work: null, drive: null };
    let startTimes = { work: "", drive: "" };
    let startCoords = null;
    let stream = null;
    const scanIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="#1976d2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="10" rx="2" ry="2"/><line x1="6" y1="10" x2="6" y2="14"/><line x1="10" y1="10" x2="10" y2="14"/><line x1="14" y1="10" x2="14" y2="14"/><line x1="18" y1="10" x2="18" y2="14"/></svg>`;

    function getHHMM() {
        const now = new Date();
        return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    }

    function saveState() {
        const state = {
            workRunning: timers.work !== null,
            driveRunning: timers.drive !== null,
            startTimeWork: startTimes.work,
            startTimeDrive: startTimes.drive,
            dtStart: document.getElementById('dt-start').value,
            dtTo: document.getElementById('dt-to').value
        };
        localStorage.setItem('octo_timer_state', JSON.stringify(state));
    }

    function loadState() {
        const saved = localStorage.getItem('octo_timer_state');
        if (!saved) return;
        const state = JSON.parse(saved);

        if (state.startTimeWork) {
            startTimes.work = state.startTimeWork;
            document.getElementById('dt-start').value = state.dtStart;
            const input = document.getElementById('input-start-work');
            if (state.workRunning) {
                input.classList.add('blinking');
                input.value = getHHMM();
                timers.work = setInterval(() => { input.value = getHHMM(); }, 1000);
            } else {
                input.value = state.startTimeWork;
            }
        }
        if (state.startTimeDrive) {
            startTimes.drive = state.startTimeDrive;
            document.getElementById('dt-to').value = state.dtTo;
            const input = document.getElementById('input-start-drive');
            if (state.driveRunning) {
                input.classList.add('blinking');
                input.value = getHHMM();
                timers.drive = setInterval(() => { input.value = getHHMM(); }, 1000);
            } else {
                input.value = state.startTimeDrive;
            }
        }
    }

    function toggleTimer(type, dtId, inputId, isDrive = false) {
        if (timers[type]) return; 
        const input = document.getElementById(inputId);
        const dtField = document.getElementById(dtId);
        const now = new Date();
        dtField.value = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
        
        startTimes[type] = getHHMM();
        input.classList.add('blinking');
        input.value = startTimes[type];
        timers[type] = setInterval(() => { input.value = getHHMM(); }, 1000);
        saveState();

        if (isDrive && navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => { startCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude }; });
        }
    }

    function stopTimer(type, dtId, inputId, startInputId, isDrive = false) {
        if (timers[type]) { clearInterval(timers[type]); timers[type] = null; }
        const startInput = document.getElementById(startInputId);
        startInput.classList.remove('blinking');
        if (startTimes[type]) startInput.value = startTimes[type];

        const now = new Date();
        document.getElementById(dtId).value = new Date(now.getTime() - (now.getTimezoneOffset() * 60000)).toISOString().slice(0, 16);
        document.getElementById(inputId).value = getHHMM();
        saveState();

        if (isDrive && navigator.geolocation && startCoords) {
            navigator.geolocation.getCurrentPosition(pos => {
                const R = 6371;
                const dLat = (pos.coords.latitude - startCoords.lat) * Math.PI / 180;
                const dLon = (pos.coords.longitude - startCoords.lon) * Math.PI / 180;
                const a = Math.sin(dLat/2)**2 + Math.cos(startCoords.lat*Math.PI/180)*Math.cos(pos.coords.latitude*Math.PI/180)*Math.sin(dLon/2)**2;
                const d = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                document.getElementById('km-trip').value = Math.round(d * 1.3);
            });
        }
    }

    function openNav() {
        const adresa = document.getElementById('customer').value;
        if (adresa) { window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(adresa)}`, '_blank'); } 
        else { alert("Zadejte adresu zákazníka."); }
    }

    function addPart() {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'part-item-block';
        div.innerHTML = `
            <div class="item-row">
                <div class="input-group-styled"><input type="text" class="p-n" placeholder="Díl / Materiál"><button class="btn-del-flat" onclick="confirmDelete(this)">🗑️</button></div>
                <div class="input-group-styled" style="flex:0.6;"><input type="text" class="p-note" placeholder="Pozn./ks"></div>
            </div>
            <div class="item-row">
                <div class="input-group-styled"><input type="text" id="o-${id}" class="p-so" placeholder="S/N pův."><button class="scan-btn-graphic" onclick="startScanner('o-${id}')">${scanIcon}</button></div>
                <div class="input-group-styled"><input type="text" id="n-${id}" class="p-sn" placeholder="S/N nové"><button class="scan-btn-graphic" onclick="startScanner('n-${id}')">${scanIcon}</button></div>
            </div>`;
        document.getElementById('parts-list').appendChild(div);
    }

    function confirmDelete(btn) { if (confirm("Chcete opravdu smazat položku?")) { btn.closest('.part-item-block').remove(); } }

    async function startScanner(inputId) {
        document.getElementById('video-container').style.display = 'block';
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            document.getElementById('video').srcObject = stream;
            document.getElementById('video').play();
        } catch(e) { alert("Kamera není dostupná."); stopScanner(); }
    }

    function stopScanner() { if (stream) stream.getTracks().forEach(t => t.stop()); document.getElementById('video-container').style.display = 'none'; }

    function setupCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext("2d");
        let drawing = false;
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        const getPos = (e) => {
            const rect = canvas.getBoundingClientRect();
            const cx = e.clientX || (e.touches && e.touches[0].clientX);
            const cy = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: cx - rect.left, y: cy - rect.top };
        };
        const start = (e) => { drawing = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); };
        const move = (e) => { if(!drawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); e.preventDefault(); };
        canvas.addEventListener("mousedown", start); canvas.addEventListener("touchstart", start);
        canvas.addEventListener("mousemove", move); canvas.addEventListener("touchmove", move);
        window.addEventListener("mouseup", () => drawing = false); window.addEventListener("touchend", () => drawing = false);
    }

    function clearCanvas(id) { document.getElementById(id).getContext("2d").clearRect(0, 0, 2000, 2000); }

    function sendEmail() {
        const mail = document.getElementById('customer-email').value;
        const id = document.getElementById('order-id').value;
        window.location.href = `mailto:${mail}?subject=Servisní protokol ${id}`;
    }

    window.onload = () => { setupCanvas("sig-worker"); setupCanvas("sig-cust"); loadState(); };
</script>
</body>
</html>
